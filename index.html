<!-- Persistent: mini player + audio, không bị xóa khi navigate -->
<div id="persistent">
  <div class="zmp-bottom" id="zbottom" style="display:none">
    <div class="zbt-art"><img id="zbt-art" src="" alt="" onclick="window.go&&go('nhac')"></div>
    <div class="zbt-info" onclick="window.go&&go('nhac')" style="cursor:pointer">
      <div class="zbt-title" id="zbt-title">–</div>
      <div class="zbt-artist" id="zbt-artist">–</div>
    </div>
    <div class="zbt-controls">
      <button class="zbt-btn" onclick="zPrev()" title="Trước"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
      <button class="zbt-play" id="zbt-play" onclick="zTogglePlay()"><svg id="zbt-play-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
      <button class="zbt-btn" onclick="zNext()" title="Tiếp"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="m6 18 8.5-6L6 6v12zm2-8.14 5.5 3.64L8 19.14V9.86zM16 6h2v12h-2z"/></svg></button>
    </div>
    <div class="zbt-prog">
      <div class="zbt-bar" onclick="zSeekBar(event)">
        <div class="zbt-fill" id="zbt-fill" style="width:0%"></div>
      </div>
      <div class="zbt-times"><span id="zbt-cur">0:00</span><span id="zbt-dur">0:00</span></div>
    </div>
    <div class="zbt-vol">
      <span class="zbt-vol-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg></span>
      <input type="range" class="zbt-vol-sl" min="0" max="1" step="0.02"
        value="0.8" oninput="zSetVol(this.value)">
    </div>
  </div>
</div>
